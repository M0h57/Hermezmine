name: Build Hermez Link APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential ccache libtinfo5

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "\n84831b9409646a918e30573bab4c9c91346d8abd" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-preview-license
          printf "\n601085b94cd77f0b54ff86406957099ebe79c4d7" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license
          printf "\nd975f751698a77b662f1254ddbeed3901e976f5a" \
            > ~/.buildozer/android/platform/android-sdk/licenses/intel-android-extra-license

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        run: |
          # Navigate to the folder containing your source files and buildozer.spec
          cd hermez_sender/
          yes | buildozer android debug 2>&1 | tee ../build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermez-link-debug
          path: hermez_sender/bin/*.apk
          retention-days: 30

      - name: Upload build log always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
